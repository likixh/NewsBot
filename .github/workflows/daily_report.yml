name: Daily Market Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        default: '晚报'
        type: choice
        options:
          - 早报
          - 晚报

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复状态文件
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_ids.json
            today_pushed.json
          key: newsbot-state-${{ github.run_id }}
          restore-keys: |
            newsbot-state-

      - name: 确保状态文件存在
        run: |
          test -f seen_ids.json || echo '{"ids": []}' > seen_ids.json
          test -f today_pushed.json || echo '[]' > today_pushed.json

      - run: pip install -r requirements.txt

      - name: 发送日报
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ -n "${{ github.event.inputs.report_type }}" ]; then
            python daily_report.py "${{ github.event.inputs.report_type }}"
          elif [ "$HOUR" = "17" ] || [ "$HOUR" = "18" ]; then
            python daily_report.py 早报
          else
            python daily_report.py 晚报
          fi

      - name: 保存状态文件
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen_ids.json
            today_pushed.json
          key: newsbot-state-${{ github.run_id }}
